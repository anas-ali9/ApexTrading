<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AIFX Terminal | Markets</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<link href="https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist.css" rel="stylesheet" />
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "bull-green": "#089981",
          "bear-red": "#F23645",
          background: "#10141a",
          "on-surface": "#e0e2ec",
          "text-muted": "#868993",
          "surface-container": "#1c2026",
          "surface-elevated": "#1E222D",
          "border-subtle": "#363A45",
          "primary": "#b6c4ff",
          "on-primary": "#002780",
          "surface-container-high": "#262a31",
          "on-surface-variant": "#c3c5d8",
        },
        borderRadius: {
          DEFAULT: "0.125rem",
          lg: "0.25rem",
          xl: "0.5rem",
          full: "0.75rem",
        },
        fontFamily: {
          "headline-md": ["Geist"],
          "data-mono": ["JetBrains Mono"],
          "display-lg": ["Geist"],
          "body-lg": ["Geist"],
          "body-md": ["Geist"],
          "body-sm": ["Geist"],
          "headline-sm": ["Geist"],
          "label-caps": ["Geist"],
        },
        fontSize: {
          "headline-md": ["24px", { lineHeight: "32px", letterSpacing: "-0.01em", fontWeight: "600" }],
          "data-mono": ["13px", { lineHeight: "18px", fontWeight: "500" }],
          "display-lg": ["40px", { lineHeight: "48px", letterSpacing: "-0.02em", fontWeight: "700" }],
          "body-lg": ["16px", { lineHeight: "24px", fontWeight: "400" }],
          "body-md": ["14px", { lineHeight: "20px", fontWeight: "400" }],
          "body-sm": ["12px", { lineHeight: "16px", fontWeight: "400" }],
          "headline-sm": ["18px", { lineHeight: "24px", fontWeight: "600" }],
          "label-caps": ["11px", { lineHeight: "14px", letterSpacing: "0.05em", fontWeight: "700" }],
        },
      },
    },
  };
</script>
<style>
  body { margin: 0; min-height: 100vh; background-color: #10141a; color: #e0e2ec; font-family: 'Geist', sans-serif; overflow-x: hidden; }
  .sparkline { width: 80px; height: 24px; stroke-width: 1.5; fill: none; }
  .terminal-border { border: 1px solid #363A45; }
  .toast { position: fixed; left: 50%; bottom: 24px; z-index: 60; transform: translateX(-50%) translateY(28px); opacity: 0; pointer-events: none; border: 1px solid #363A45; border-radius: 12px; background: rgba(16, 20, 26, 0.96); color: #e0e2ec; padding: 12px 18px; font-family: 'JetBrains Mono', monospace; font-size: 0.78rem; transition: opacity 180ms ease, transform 180ms ease; }
  .toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body class="bg-background">
<header class="fixed top-0 left-0 right-0 h-12 z-50 flex justify-between items-center px-4 border-b border-border-subtle bg-background select-none">
  <span class="text-headline-sm font-headline-md font-bold text-on-surface">APEX</span>
  <div class="flex items-center gap-4">
    <button id="btn-get-started" class="bg-primary text-on-primary font-label-caps text-label-caps px-3 py-1.5 rounded-lg font-bold hover:opacity-80 transition-all" type="button">Get Started</button>
  </div>
</header>
<main class="pt-12 min-h-screen">
  <div id="hero" class="w-full border-b border-border-subtle bg-background p-8 text-center">
    <h1 class="font-display-lg text-display-lg text-on-surface mb-2">Markets, everywhere</h1>
    <p class="text-body-lg text-on-surface-variant">The world's markets at your fingertips.</p>
  </div>
  <div class="p-6 max-w-7xl mx-auto space-y-8">
    <section>
      <h2 class="font-headline-sm text-headline-sm mb-4">Top 3 of the Day</h2>
      <div id="top-cards" class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div class="bg-surface-container terminal-border p-4 rounded-xl"><p class="text-text-muted">Loading…</p></div>
      </div>
    </section>
    <section id="watchlist" class="bg-surface-container terminal-border rounded-xl overflow-hidden">
      <div class="px-6 py-4 border-b border-border-subtle">
        <h2 class="font-headline-sm text-headline-sm">Global Watchlist</h2>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-left">
          <thead>
            <tr class="bg-surface-elevated text-label-caps font-label-caps text-text-muted uppercase">
              <th class="px-6 py-3 border-b border-border-subtle">Asset</th>
              <th class="px-6 py-3 border-b border-border-subtle">Price</th>
              <th class="px-6 py-3 border-b border-border-subtle text-right">24H Change</th>
              <th class="px-6 py-3 border-b border-border-subtle text-center">Trend</th>
              <th class="px-6 py-3 border-b border-border-subtle text-right">Signal</th>
            </tr>
          </thead>
          <tbody id="watchlist-body" class="divide-y divide-border-subtle">
            <tr><td colspan="5" class="px-6 py-8 text-center text-text-muted">Loading…</td></tr>
          </tbody>
        </table>
      </div>
      <div class="px-6 py-3 border-t border-border-subtle flex justify-between">
        <span id="market-updated" class="text-label-caps font-label-caps text-text-muted">Last updated: —</span>
        <button id="btn-refresh" class="text-primary font-bold text-body-sm hover:underline" type="button">Refresh Data</button>
      </div>
    </section>
  </div>
</main>
<div id="toast" class="toast"></div>
<script>
const toast = document.getElementById('toast');
function showToast(msg) { if (!toast) return; toast.textContent = msg; toast.classList.add('visible'); clearTimeout(toast._h); toast._h = setTimeout(() => toast.classList.remove('visible'), 2600); }
function fmtPrice(p) { if (p == null || !isFinite(p)) return '—'; if (p >= 1000) return p.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); if (p >= 10) return p.toFixed(2); return p.toFixed(4); }
function fmtPct(p) { if (p == null || !isFinite(p)) return '—'; const s = p >= 0 ? '+' : ''; return `${s}${p.toFixed(2)}%`; }
function colorClass(v) { return v == null ? 'text-on-surface' : v >= 0 ? 'text-bull-green' : 'text-bear-red'; }
function strokeClass(v) { return v >= 0 ? 'stroke-bull-green' : 'stroke-bear-red'; }
function initials(n) { return n.split(/[\s\/]/).filter(Boolean).slice(0, 2).map(w => w[0].toUpperCase()).join(''); }
function typeLabel(t) { const m = { index: 'Index', stock: 'Stock', commodity: 'Commodity' }; return m[t] || t || 'Asset'; }
function signalClass(s) { if (!s) return 'text-text-muted'; const u = s.toUpperCase(); if (u.includes('STRONG BUY')) return 'text-bull-green font-bold'; if (u.includes('BUY')) return 'text-bull-green'; if (u.includes('STRONG SELL')) return 'text-bear-red font-bold'; if (u.includes('SELL')) return 'text-bear-red'; return 'text-text-muted'; }
function buildSparkline(bars, pct) {
  const closes = (bars || []).map(b => b.close).filter(v => v != null && isFinite(v));
  if (closes.length < 2) return `<svg class="sparkline ${strokeClass(pct ?? 0)}" viewBox="0 0 80 24"><path d="M0 12 L80 12"></path></svg>`;
  const W = 80, H = 24, PAD = 2, min = Math.min(...closes), max = Math.max(...closes), range = max - min || 1, step = (W - PAD * 2) / (closes.length - 1);
  const points = closes.map((c, i) => { const x = PAD + i * step; const y = PAD + (1 - (c - min) / range) * (H - PAD * 2); return `${x.toFixed(1)},${y.toFixed(1)}`; });
  const cls = strokeClass(pct ?? (closes[closes.length - 1] - closes[0]));
  return `<svg class="sparkline ${cls}" viewBox="0 0 ${W} ${H}"><polyline points="${points.join(' ')}"></polyline></svg>`;
}
function renderWatchlist(instruments) {
  const tbody = document.getElementById('watchlist-body');
  if (!tbody || !instruments.length) return;
  tbody.innerHTML = instruments.map(inst => {
    const { id, name, type, quote, bars, signal } = inst;
    const pct = quote?.changePct ?? 0, pctClass = colorClass(pct), abbr = initials(name), avatarBg = pct >= 0 ? 'bg-bull-green/20' : 'bg-bear-red/20', avatarText = pct >= 0 ? 'text-bull-green' : 'text-bear-red', sparkSvg = buildSparkline(bars, pct), sigClass = signalClass(signal?.signal);
    return `<tr class="hover:bg-surface-container-high transition-colors cursor-pointer" data-id="${id}"><td class="px-6 py-4"><div class="flex items-center gap-3"><div class="w-8 h-8 rounded-full ${avatarBg} flex items-center justify-center text-[10px] font-bold ${avatarText}">${abbr}</div><div><div class="font-bold text-body-md text-on-surface">${name}</div><div class="text-[10px] text-text-muted uppercase">${typeLabel(type)}</div></div></div></td><td class="px-6 py-4 font-data-mono text-body-md">${fmtPrice(quote?.price)}</td><td class="px-6 py-4 text-right font-data-mono text-body-md ${pctClass}">${fmtPct(pct)}</td><td class="px-6 py-4"><div class="flex justify-center">${sparkSvg}</div></td><td class="px-6 py-4 text-right"><span class="text-[10px] font-bold ${sigClass}">${signal?.signal ?? 'NEUTRAL'}</span></td></tr>`;
  }).join('');
}
function renderTopCards(instruments) {
  const container = document.getElementById('top-cards');
  if (!container || !instruments.length) return;
  const top3 = instruments.slice(0, 3);
  container.innerHTML = top3.map(inst => {
    const { name, quote, bars, signal } = inst, pct = quote?.changePct ?? 0, pctClass = colorClass(pct), abbr = initials(name), sparkSvg = buildSparkline(bars, pct);
    return `<div class="top-card bg-surface-container terminal-border p-4 rounded-xl flex justify-between items-center hover:bg-surface-container-high transition-colors cursor-pointer"><div class="flex items-center gap-3"><div class="w-10 h-10 rounded-full bg-surface-elevated flex items-center justify-center font-bold text-on-surface text-[11px]">${abbr}</div><div><p class="font-bold text-body-md">${name}</p><p class="text-text-muted text-body-sm ${signalClass(signal?.signal)}">${signal?.signal ?? 'NEUTRAL'}</p></div></div><div class="text-right"><p class="font-data-mono text-body-md ${pctClass}">${fmtPrice(quote?.price)}</p><p class="font-data-mono text-body-sm ${pctClass}">${fmtPct(pct)}</p><div class="ml-auto mt-1">${sparkSvg}</div></div></div>`;
  }).join('');
}
async function loadMarketData() {
  try {
    const res = await fetch('/api/market');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    const instruments = Object.values(json.data || {});
    if (!instruments.length) { showToast('No market data.'); return; }
    const sorted = [...instruments].sort((a, b) => Math.abs(b.quote?.changePct ?? 0) - Math.abs(a.quote?.changePct ?? 0));
    renderTopCards(sorted);
    renderWatchlist(instruments);
    const updatedEl = document.getElementById('market-updated');
    if (updatedEl && json.lastUpdated) { const d = new Date(json.lastUpdated); updatedEl.textContent = `Last updated: ${d.toLocaleTimeString()}`; }
    const allSample = instruments.every(i => i.source === 'sample');
    if (allSample) showToast('Showing sample data — live providers loading.');
  } catch (err) { console.error('[market]', err); showToast('Failed to load market data.'); }
}
async function triggerRefresh() {
  const btn = document.getElementById('btn-refresh');
  if (btn) { btn.textContent = 'Refreshing…'; btn.disabled = true; }
  try {
    const res = await fetch('/api/refresh', { method: 'POST' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    showToast('Refresh triggered.');
    setTimeout(loadMarketData, 4000);
  } catch (err) { console.error('[refresh]', err); showToast('Refresh failed.'); }
  finally { if (btn) { btn.textContent = 'Refresh Data'; btn.disabled = false; } }
}
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('btn-get-started')?.addEventListener('click', () => { document.getElementById('watchlist')?.scrollIntoView({ behavior: 'smooth' }); });
  document.getElementById('btn-refresh')?.addEventListener('click', triggerRefresh);
  loadMarketData();
  setInterval(loadMarketData, 60000);
});
</script>
</body>
</html>
